<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main-container">
      <div class="text-container">
        <h1>Learn to code by watching others</h1>
        <p>
          See how experienced developers solve problems in real-time. Watching
          scripted tutorials is great, but understanding how developers think is
          invaluable.
        </p>
      </div>
      <article class="sub-container">
        <div class="price-info">
          <p>
            Try it free 7 days
            <span class="price"> then $20/mo. there after</span>
          </p>
        </div>
        <form class="form-container" novalidate>
          <div class="input-group">
            <input
              type="text"
              placeholder="First Name"
              class="first-name"
              aria-label="First Name"
            /><img
              src="./images/icon-error.svg"
              alt="Error"
              class="error-icon"
            /><small class="error-text"></small>
          </div>
          <div class="input-group">
            <input
              type="text"
              placeholder="Last Name"
              class="last-name"
              aria-label="Last Name"
            /><img
              src="./images/icon-error.svg"
              class="error-icon"
              alt="Error"
            /><small class="error-text"></small>
          </div>
          <div class="input-group">
            <input
              type="email"
              placeholder="Email Address"
              class="email"
              aria-label="email"
            /><img
              src="./images/icon-error.svg"
              alt="Error"
              class="error-icon"
            /><small class="error-text"></small>
          </div>
          <div class="input-group">
            <input
              type="password"
              placeholder="Password"
              class="password"
              aria-label="password"
            /><img
              src="./images/icon-error.svg"
              alt="Error"
              class="error-icon"
            /><small class="error-text"></small>
          </div>
          <button type="submit" class="trial-btn">CLAIM YOUR FREE TRIAL</button>
          <span class="footer-text">
            By clicking the button, you are agreeing to our
            <span class="highlighted-text">Terms and Services</span>
          </span>
        </form>
      </article>
    </main>
    <script src="index.js"></script>
  </body>
</html>
